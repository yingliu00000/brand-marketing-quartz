<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#ffffff" />
    <title>品牌营销知识库</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="stylesheet" href="styles.css" />
    <script>
      window.BRAND_CHAT_CONFIG = {
        apiBase: "https://brand-mchat-api-bfocxjztup.cn-beijing.fcapp.run",
      };
    </script>
  </head>
  <body>
    <div class="app">
      <aside class="sidebar" aria-label="知识库导航">
        <div class="window-dots" aria-hidden="true">
          <span></span><span></span><span></span>
        </div>

        <label class="search">
          <span>⌕</span>
          <input id="historySearch" type="search" placeholder="搜索历史问题" />
        </label>

        <div class="brand">
          <div class="brand-title">品牌营销知识库</div>
          <div class="brand-subtitle">Strategy Intelligence</div>
        </div>

        <div class="sidebar-section">项目</div>
        <button id="newChat" class="nav-item active" type="button">
          <span class="nav-icon">＋</span>
          <span>新建提问</span>
        </button>

        <div class="sidebar-section">最近</div>
        <nav id="sessions" class="sessions">
          <div class="session-empty">暂无公开对话</div>
        </nav>

        <div class="sidebar-footer">
          <div class="user-dot">营</div>
          <span>品牌增长助手</span>
        </div>
      </aside>

      <main class="main">
        <header class="topbar">
          <button id="sidebarToggle" class="sidebar-toggle" type="button" aria-label="打开导航">☰</button>
          <div class="top-title">
            <strong>品牌营销知识库</strong>
            <span id="connectionStatus">DeepSeek 已接入</span>
          </div>
          <div class="top-actions">
            <label class="model-picker" aria-label="选择 DeepSeek 模型">
              <span>模型</span>
              <select id="modelSelect">
                <option value="deepseek-v4-flash">Flash</option>
                <option value="deepseek-v4-pro">Pro</option>
              </select>
            </label>
            <div class="status-pill">全量知识入口</div>
          </div>
        </header>

        <section id="messages" class="messages" aria-live="polite">
          <div class="empty">
            <h1>今天想拆哪个品牌营销问题？</h1>
            <p>
              可以问增长策略、私域运营、内容营销、消费者洞察、品牌案例和品类趋势。
              公开页面只提供问答入口，不展示全量文章库。
            </p>
            <div class="prompts">
              <button type="button" data-prompt="帮我拆一个新消费品牌的增长策略，先看哪些维度？">
                新消费品牌增长，先看哪些维度？
              </button>
              <button type="button" data-prompt="小红书内容种草怎么判断是不是有效？">
                小红书种草效果怎么判断？
              </button>
              <button type="button" data-prompt="私域复购体系应该怎么搭？">
                私域复购体系怎么搭？
              </button>
            </div>
          </div>
        </section>

        <form id="composer" class="composer">
          <textarea id="input" rows="1" placeholder="问品牌营销知识库任何策略、案例或方法论问题"></textarea>
          <div class="composer-toolbar">
            <button class="tool-button" type="button" aria-label="附件占位">＋</button>
            <button id="send" class="send-button" type="submit" aria-label="发送">↗</button>
          </div>
        </form>
      </main>
    </div>

    <script src="app.js"></script>
  </body>
</html>
