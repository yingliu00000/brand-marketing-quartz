# yaml-language-server: $schema=./quartz/plugins/quartz-plugins.schema.json
configuration:
  pageTitle: 品牌营销知识库
  pageTitleSuffix: ""
  enableSPA: true
  enablePopovers: true
  analytics:
    provider: plausible
  locale: zh-CN
  baseUrl: lilyliu.github.io/brand-marketing-quartz
  ignorePatterns:
    - private
    - templates
    - .obsidian
    - 08-AI知识库
    - 07-脚本与工具
  theme:
    fontOrigin: googleFonts
    cdnCaching: true
    typography:
      header: Noto Sans SC
      body: Noto Sans SC
      code: IBM Plex Mono
    colors:
      lightMode:
        light: "#fbfaf7"
        lightgray: "#e8e4dd"
        gray: "#aaa39a"
        darkgray: "#4c4944"
        dark: "#25231f"
        secondary: "#0f6b63"
        tertiary: "#b25f2f"
        highlight: rgba(15, 107, 99, 0.12)
        textHighlight: "#fff2a866"
      darkMode:
        light: "#171818"
        lightgray: "#333635"
        gray: "#747a76"
        darkgray: "#d5d2ca"
        dark: "#f0eee7"
        secondary: "#6dc5b7"
        tertiary: "#d49a72"
        highlight: rgba(109, 197, 183, 0.14)
        textHighlight: "#806f1f88"
plugins:
  - source: github:quartz-community/created-modified-date
    enabled: true
    options:
      defaultDateType: modified
      priority:
        - frontmatter
        - git
        - filesystem
    order: 10
  - source: github:quartz-community/syntax-highlighting
    enabled: true
    options:
      theme:
        light: github-light
        dark: github-dark
      keepBackground: false
    order: 20
  - source: github:quartz-community/obsidian-flavored-markdown
    enabled: true
    options:
      enableInHtmlEmbed: false
      enableCheckbox: true
    order: 30
  - source: github:quartz-community/github-flavored-markdown
    enabled: true
    order: 40
  - source: github:quartz-community/table-of-contents
    enabled: true
    order: 50
    layout:
      position: right
      priority: 30
  - source: github:quartz-community/crawl-links
    enabled: true
    options:
      markdownLinkResolution: shortest
    order: 60
  - source: github:quartz-community/description
    enabled: true
    order: 70
  - source: github:quartz-community/latex
    enabled: true
    options:
      renderEngine: katex
    order: 80
  - source: github:quartz-community/fonts
    enabled: true
  - source: github:quartz-community/remove-draft
    enabled: true
  - source: github:quartz-community/alias-redirects
    enabled: true
  - source: github:quartz-community/content-index
    enabled: true
    options:
      enableSiteMap: true
      enableRSS: true
  - source: github:quartz-community/favicon
    enabled: true
  - source: github:quartz-community/cname
    enabled: true
  - source: github:quartz-community/canvas-page
    enabled: true
  - source: github:quartz-community/content-page
    enabled: true
